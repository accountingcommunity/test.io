<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Community Discord</title>
    <style>
        /* Base page styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6; /* Light gray background */
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Center card container */
        .container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        /* Headings and text */
        h1 {
            color: #2563eb; /* Professional blue */
            margin-bottom: 1rem;
            font-size: 2.2rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 2.5rem;
        }

        /* Discord Button Styling */
        .discord-btn {
            background-color: #5865F2; /* Official Discord color */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        /* SVG Icon sizing */
        .icon {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Accounting Community</h1>
        <p>Welcome to the ultimate hub for accounting professionals, students, and number crunchers. Join our Discord to network, share resources, study for exams, and talk shop!</p>
